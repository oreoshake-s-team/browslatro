name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run App tests
        run: yarn test src/App.test.tsx

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests
        run: yarn test --exclude '**/App.test.tsx' --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Resolve Playwright version
        id: playwright-version
        run: echo "version=$(yarn info @playwright/test --json | python3 -c 'import sys,json; print(json.load(sys.stdin)["children"]["Version"])')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      - name: Build production bundle
        run: yarn build

      - name: Run Playwright tests
        run: yarn e2e

      - name: Upload Playwright report
        id: playwright-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Link Playwright report in job summary
        if: failure()
        env:
          REPORT_URL: ${{ steps.playwright-report.outputs.artifact-url }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Playwright report

          The e2e run failed. The full HTML report (with traces and failure
          screenshots from the retried specs) is attached to this run:

          [Download the \`playwright-report\` artifact]($REPORT_URL)

          Unzip it and run \`yarn playwright show-report playwright-report\` to
          view it locally.
          EOF
