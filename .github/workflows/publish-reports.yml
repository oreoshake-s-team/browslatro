name: Publish reports

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy in flight at a time. Don't cancel in-progress deploys
# because actions/deploy-pages is sensitive to interruption.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run tests with coverage
        run: yarn test:coverage

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 7

  build-e2e-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build production bundle
        run: yarn build

      - name: Run Playwright tests
        run: yarn e2e

      - name: Upload Playwright HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [build-coverage, build-e2e-report]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: site/coverage

      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-html
          path: site/playwright

      - name: Build landing page
        run: |
          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>Browslatro CI reports</title>
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <style>
                :root { color-scheme: light dark; }
                body {
                  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, sans-serif;
                  max-width: 36rem;
                  margin: 4rem auto;
                  padding: 0 1.5rem;
                  line-height: 1.5;
                }
                h1 { margin-bottom: 0.25rem; }
                .meta { color: #6c757d; font-size: 0.95rem; }
                ul { padding: 0; list-style: none; }
                li { margin: 1rem 0; }
                a {
                  display: block;
                  padding: 1rem 1.2rem;
                  border: 1px solid #adb5bd;
                  border-radius: 8px;
                  text-decoration: none;
                  color: inherit;
                }
                a:hover { border-color: #495057; }
                .title { font-weight: 700; font-size: 1.1rem; }
                .desc { color: #6c757d; font-size: 0.95rem; margin-top: 0.25rem; }
              </style>
            </head>
            <body>
              <h1>Browslatro CI reports</h1>
              <p class="meta">
                Last published from main · commit
                <a href="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}">
                  ${GITHUB_SHA:0:7}
                </a>
              </p>
              <ul>
                <li>
                  <a href="./coverage/">
                    <div class="title">Vitest coverage report</div>
                    <div class="desc">Line / branch / function / statement coverage for src/.</div>
                  </a>
                </li>
                <li>
                  <a href="./playwright/">
                    <div class="title">Playwright E2E report</div>
                    <div class="desc">Browser-driven specs for round flows, shop, consumables, card sizing.</div>
                  </a>
                </li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
